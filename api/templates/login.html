<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Credit Card Underwriting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #16a34a; --green-lt: #dcfce7;
      --red:    #dc2626; --red-lt:   #fee2e2;
      --blue:   #2563eb; --blue-lt:  #dbeafe;
      --gray:   #6b7280; --gray-lt:  #f3f4f6;
      --border: #e5e7eb; --radius: 8px;
      --font: system-ui, -apple-system, sans-serif;
    }
    body { font-family: var(--font); background: #f9fafb; color: #111827; font-size: 14px;
           min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    h1 { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
    .subtitle { font-size: .8rem; color: var(--gray); text-align: center; margin-bottom: 20px; }
    label { display: block; font-size: .78rem; font-weight: 500; color: #374151; margin-bottom: 2px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius);
      font-size: .85rem; background: #fff; transition: border-color .15s;
    }
    input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-lt); }
    button { cursor: pointer; border: none; border-radius: var(--radius); font-size: .85rem;
             font-weight: 600; padding: 9px 18px; transition: opacity .15s; width: 100%; }
    button:hover { opacity: .85; }
    .btn-primary { background: var(--blue); color: #fff; }

    .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
            padding: 28px 28px 24px; width: 100%; max-width: 380px; }
    .field { margin-bottom: 14px; }

    .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
    .tab-btn {
      flex: 1; padding: 8px 0; border: none; background: none; color: var(--gray);
      font-size: .85rem; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
    }
    .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .error-banner { background: var(--red-lt); border: 1px solid var(--red); color: var(--red);
                    border-radius: var(--radius); padding: 8px 12px; font-size: .8rem; margin-bottom: 12px; }
    .success-banner { background: var(--green-lt); border: 1px solid var(--green); color: var(--green);
                      border-radius: var(--radius); padding: 8px 12px; font-size: .8rem; margin-bottom: 12px; }
    .pill { background: var(--blue-lt); color: var(--blue); padding: 2px 10px; border-radius: 99px;
            font-size: .72rem; font-weight: 600; display: inline-block; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div style="text-align:center;">
    <span class="pill">XGBoost Model</span>
  </div>
  <h1>Credit Card Underwriting</h1>
  <p class="subtitle">Sign in to access the scoring engine</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login', this)">Sign In</button>
    <button class="tab-btn"        onclick="switchTab('register', this)">Register</button>
  </div>

  <!-- ── Login ── -->
  <div id="tab-login" class="tab-panel active">
    <div id="login-error" class="error-banner" style="display:none;"></div>
    <form onsubmit="return handleLogin(event)">
      <div class="field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>
  </div>

  <!-- ── Register ── -->
  <div id="tab-register" class="tab-panel">
    <div id="register-error"   class="error-banner"  style="display:none;"></div>
    <div id="register-success" class="success-banner" style="display:none;"></div>
    <form onsubmit="return handleRegister(event)">
      <div class="field">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label for="reg-password">Password <span style="color:var(--gray);font-weight:400;">(min. 8 characters)</span></label>
        <input type="password" id="reg-password" placeholder="••••••••" required minlength="8" />
      </div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
  </div>
</div>

<script>
  // If already logged in, go straight to the app
  if (localStorage.getItem("token")) {
    window.location.href = "/";
  }

  function switchTab(name, btn) {
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    btn.classList.add("active");
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = "block";
  }

  function hideError(id) {
    document.getElementById(id).style.display = "none";
  }

  async function handleLogin(evt) {
    evt.preventDefault();
    hideError("login-error");
    const email    = document.getElementById("login-email").value;
    const password = document.getElementById("login-password").value;

    // /auth/token requires form-encoded data (OAuth2 spec)
    const res = await fetch("/auth/token", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`,
    });

    if (res.ok) {
      const data = await res.json();
      localStorage.setItem("token", data.access_token);
      window.location.href = "/";
    } else {
      const data = await res.json().catch(() => ({}));
      showError("login-error", data.detail || "Sign in failed. Please try again.");
    }
    return false;
  }

  async function handleRegister(evt) {
    evt.preventDefault();
    hideError("register-error");
    document.getElementById("register-success").style.display = "none";
    const email    = document.getElementById("reg-email").value;
    const password = document.getElementById("reg-password").value;

    const res = await fetch("/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    });

    if (res.ok) {
      // Auto-login after successful registration
      const loginRes = await fetch("/auth/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`,
      });
      if (loginRes.ok) {
        const data = await loginRes.json();
        localStorage.setItem("token", data.access_token);
        window.location.href = "/";
      }
    } else {
      const data = await res.json().catch(() => ({}));
      showError("register-error", data.detail || "Registration failed. Please try again.");
    }
    return false;
  }
</script>
</body>
</html>
